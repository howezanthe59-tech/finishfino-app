<section class="reset-section">
  <div class="reset-card">
    <div class="reset-header">
      <h1>Reset Password</h1>
      <p>Set a new password for your FinishFino account.</p>
    </div>

    <div class="reset-error" *ngIf="errorMessage" role="alert">
      {{ errorMessage }}
    </div>

    <div class="reset-success" *ngIf="successMessage" role="status">
      {{ successMessage }}
      <button type="button" class="btn-secondary" (click)="goToLogin()">Go to Login</button>
    </div>

    <form *ngIf="!successMessage" [formGroup]="resetForm" (ngSubmit)="onSubmit()" novalidate>
      <div class="form-group">
        <label for="newPassword">New Password</label>
        <div class="password-input-wrapper">
          <input
            [type]="showPassword ? 'text' : 'password'"
            id="newPassword"
            formControlName="password"
            placeholder="At least 8 characters"
            [attr.aria-invalid]="submitted && f['password'].errors ? 'true' : null"
            [class.is-invalid]="submitted && f['password'].errors"
          />
          <button
            type="button"
            class="toggle-password"
            aria-label="Toggle password visibility"
            (click)="showPassword = !showPassword"
          >
            <span aria-hidden="true">{{ showPassword ? 'Hide' : 'Show' }}</span>
          </button>
        </div>
        <span class="error-message" *ngIf="submitted && f['password'].errors" role="alert">
          <ng-container *ngIf="f['password'].errors && f['password'].errors['required']">
            New password is required.
          </ng-container>
          <ng-container *ngIf="f['password'].errors && f['password'].errors['minlength']">
            Password must be at least 8 characters.
          </ng-container>
        </span>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <div class="password-input-wrapper">
          <input
            [type]="showConfirmPassword ? 'text' : 'password'"
            id="confirmPassword"
            formControlName="confirmPassword"
            placeholder="Repeat your new password"
            [attr.aria-invalid]="submitted && (f['confirmPassword'].errors || passwordMismatch) ? 'true' : null"
            [class.is-invalid]="submitted && (f['confirmPassword'].errors || passwordMismatch)"
          />
          <button
            type="button"
            class="toggle-password"
            aria-label="Toggle confirm password visibility"
            (click)="showConfirmPassword = !showConfirmPassword"
          >
            <span aria-hidden="true">{{ showConfirmPassword ? 'Hide' : 'Show' }}</span>
          </button>
        </div>
        <span class="error-message" *ngIf="submitted && (f['confirmPassword'].errors || passwordMismatch)" role="alert">
          <ng-container *ngIf="f['confirmPassword'].errors && f['confirmPassword'].errors['required']">
            Confirm your new password.
          </ng-container>
          <ng-container *ngIf="passwordMismatch">
            Passwords do not match.
          </ng-container>
        </span>
      </div>

      <button type="submit" class="btn-primary" [disabled]="submitting">
        {{ submitting ? 'Resetting...' : 'Reset Password' }}
      </button>
      <button type="button" class="btn-secondary" (click)="goToLogin()">Back to Login</button>
    </form>
  </div>
</section>
